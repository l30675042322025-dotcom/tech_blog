server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:tche_blog}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: false

aliyun:
  oss:
    enabled: 
    endpoint: 
    bucket-name: 
    avatar-dir: 
    log-dir: 
    article-dir:

storage:
  local-root: ../Front_end/aliyun
  public-base-url: http://localhost:8080/api/files

cors:
  allowed-origins: "*"

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    root: INFO
    org.apache.ibatis: ERROR
    org.mybatis: ERROR
    org.springframework.jdbc: ERROR
    com.baomidou.mybatisplus: ERROR
    com.zaxxer.hikari: ERROR
    com.mysql.cj: ERROR
    com.tche.blog: INFO

management:
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}

ai:
  summary:
    enabled: ${AI_SUMMARY_ENABLED:false}
    base-url: ${AI_SUMMARY_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    api-key: ${AI_SUMMARY_API_KEY:}
    model: ${AI_SUMMARY_MODEL:glm-4}
    connect-timeout-seconds: 10
    read-timeout-seconds: 45
    max-input-chars: 6000

amap:
  enabled: ${AMAP_ENABLED:false}
  key: ${AMAP_WEB_SERVICE_KEY:}
  reverse-geocode-url: https://restapi.amap.com/v3/geocode/regeo
  connect-timeout-seconds: 6
  read-timeout-seconds: 8

music:
  enabled: true
  local-root: ../Songs
  max-tracks: 300
