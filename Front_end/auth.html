<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>笔落客 - 登录/注册</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./auth.css" />
    <link rel="stylesheet" href="./site-session.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <!-- 左侧表单区域 -->
      <section class="auth-card" aria-label="登录与注册">
        <a href="./index.html" class="back-btn" aria-label="返回首页">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <div class="auth-card-inner">
        <div class="tabs" role="tablist" aria-label="认证切换">
          <button
            id="tab-login"
            class="tab-btn active"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="panel-login"
            data-tab="login"
          >
            登录
          </button>
          <button
            id="tab-register"
            class="tab-btn"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="panel-register"
            data-tab="register"
          >
            注册
          </button>
        </div>

        <section
          id="panel-login"
          class="auth-panel active"
          role="tabpanel"
          aria-labelledby="tab-login"
          data-panel="login"
        >
          <h1>欢迎回来</h1>
          <p class="panel-subtitle">请输入您的账号信息登录</p>

          <form id="login-form" class="auth-form" novalidate>
            <label for="login-account">用户名/邮箱</label>
            <div class="field-wrap">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="8" r="3.2" stroke="currentColor" stroke-width="1.8" />
                  <path d="M5 19a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              <input
                id="login-account"
                name="account"
                type="text"
                placeholder="请输入用户名或邮箱"
                autocomplete="username"
                required
              />
            </div>

            <div class="label-row">
              <label for="login-password">密码</label>
              <a href="#" class="minor-link">忘记密码？</a>
            </div>
            <div class="field-wrap">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8" />
                  <path d="M8 10V8a4 4 0 0 1 8 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              <input
                id="login-password"
                name="password"
                type="password"
                placeholder="请输入密码"
                autocomplete="current-password"
                required
              />
              <button
                class="field-toggle"
                type="button"
                data-toggle-password="login-password"
                aria-label="显示密码"
              >
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                  <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8" />
                  <path d="M4 4 20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </button>
            </div>

            <label for="login-captcha">验证码</label>
            <div class="captcha-row">
              <div class="field-wrap captcha-input-wrap">
                <input
                  id="login-captcha"
                  name="captchaCode"
                  type="text"
                  placeholder="请输入4位验证码"
                  autocomplete="off"
                  inputmode="text"
                  minlength="4"
                  maxlength="4"
                  pattern="[A-Za-z0-9]{4}"
                  required
                />
              </div>
              <button
                id="login-captcha-refresh"
                class="captcha-refresh-btn"
                type="button"
                aria-label="刷新验证码"
              >
                <img id="login-captcha-image" class="captcha-image" alt="验证码" />
              </button>
            </div>
            <input id="login-captcha-id" name="captchaId" type="hidden" />

            <label class="check-row">
              <input type="checkbox" checked />
              <span>记住我 30 天</span>
            </label>

            <button class="primary-btn" type="submit">登录</button>
          </form>

          <p class="feedback" data-feedback="login" aria-live="polite"></p>

          <p class="switch-row">
            还没有账号？
            <button class="text-link" type="button" data-switch-tab="register">立即注册</button>
          </p>
        </section>

        <section
          id="panel-register"
          class="auth-panel"
          role="tabpanel"
          aria-labelledby="tab-register"
          data-panel="register"
          hidden
        >
          <h1>创建账号</h1>
          <p class="panel-subtitle">注册后可发布文章，并通过邮箱完成账号绑定</p>

          <form id="register-form" class="auth-form" novalidate>
            <label for="register-name">用户名</label>
            <div class="field-wrap">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="8" r="3.2" stroke="currentColor" stroke-width="1.8" />
                  <path d="M5 19a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              <input
                id="register-name"
                name="username"
                type="text"
                placeholder="请输入用户名"
                autocomplete="username"
                required
              />
            </div>

            <label for="register-email">绑定邮箱</label>
            <div class="field-wrap">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <rect x="3.2" y="5.5" width="17.6" height="13" rx="2" stroke="currentColor" stroke-width="1.8" />
                  <path d="m4.5 7 7.5 6 7.5-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              <input
                id="register-email"
                name="email"
                type="email"
                placeholder="请输入常用邮箱，用于账号绑定"
                autocomplete="email"
                required
              />
            </div>

            <label for="register-email-code">邮箱验证码</label>
            <div class="email-code-row">
              <div class="field-wrap email-code-input-wrap">
                <input
                  id="register-email-code"
                  name="emailCode"
                  type="text"
                  placeholder="请输入6位邮箱验证码"
                  autocomplete="one-time-code"
                  inputmode="numeric"
                  minlength="6"
                  maxlength="6"
                  pattern="[0-9]{6}"
                  required
                />
              </div>
              <button id="send-register-email-code" class="email-code-btn" type="button">发送验证码</button>
            </div>

            <label for="register-password">密码</label>
            <div class="field-wrap">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8" />
                  <path d="M8 10V8a4 4 0 0 1 8 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              <input
                id="register-password"
                name="password"
                type="password"
                placeholder="请输入密码"
                minlength="6"
                autocomplete="new-password"
                required
              />
              <button
                class="field-toggle"
                type="button"
                data-toggle-password="register-password"
                aria-label="显示密码"
              >
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                  <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8" />
                  <path d="M4 4 20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </button>
            </div>

            <label for="register-confirm">确认密码</label>
            <div class="field-wrap">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8" />
                  <path d="M8 10V8a4 4 0 0 1 8 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              <input
                id="register-confirm"
                name="confirmPassword"
                type="password"
                placeholder="请再次输入密码"
                minlength="6"
                autocomplete="new-password"
                required
              />
            </div>

            <label class="check-row">
              <input type="checkbox" required />
              <span>我已阅读并同意用户协议与隐私政策</span>
            </label>

            <button class="primary-btn" type="submit">注册并绑定邮箱</button>
          </form>

          <p class="feedback" data-feedback="register" aria-live="polite"></p>

          <p class="switch-row">
            已有账号？
            <button class="text-link" type="button" data-switch-tab="login">立即登录</button>
          </p>
        </section>

        <a class="guest-mode-btn" href="./index.html" data-guest-mode>游客模式浏览</a>
        </div>
      </section>

      <!-- 右侧装饰区域 -->
      <aside class="auth-decoration" aria-hidden="true">
        <div class="decoration-brand">
          <svg class="brand-sparkle" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z" fill="currentColor"/>
          </svg>
          <span class="brand-text">笔落客</span>
        </div>
        
        <div class="puppets-container">
          <!-- 紫色玩偶 (中间高，最后面) -->
          <div class="puppet puppet-purple" data-puppet="purple">
            <div class="puppet-body"></div>
            <div class="puppet-eyes">
              <div class="eye eye-large">
                <div class="eye-sclera"></div>
                <div class="eye-pupil"></div>
              </div>
              <div class="eye eye-large">
                <div class="eye-sclera"></div>
                <div class="eye-pupil"></div>
              </div>
            </div>
          </div>
          
          <!-- 深灰玩偶 (中间右，中间层) -->
          <div class="puppet puppet-grey" data-puppet="grey">
            <div class="puppet-body"></div>
            <div class="puppet-eyes">
              <div class="eye eye-large">
                <div class="eye-sclera"></div>
                <div class="eye-pupil"></div>
              </div>
              <div class="eye eye-large">
                <div class="eye-sclera"></div>
                <div class="eye-pupil"></div>
              </div>
            </div>
          </div>
          
          <!-- 橙色玩偶 (左下，最前面左侧) -->
          <div class="puppet puppet-orange" data-puppet="orange">
            <div class="puppet-body"></div>
            <div class="puppet-eyes">
              <div class="eye">
                <div class="eye-pupil"></div>
              </div>
              <div class="eye">
                <div class="eye-pupil"></div>
              </div>
            </div>
          </div>
          
          <!-- 黄色玩偶 (右下，最前面右侧) -->
          <div class="puppet puppet-yellow" data-puppet="yellow">
            <div class="puppet-body">
              <div class="puppet-eyes">
                <div class="eye">
                  <div class="eye-pupil"></div>
                </div>
                <div class="eye">
                  <div class="eye-pupil"></div>
                </div>
              </div>
              <div class="puppet-mouth"></div>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <script src="./aliyun-storage.js"></script>
    <script src="./site-api.js"></script>
    <script src="./site-session.js"></script>
    <script type="module" src="./auth.js"></script>
    <script src="./auth-puppets.js"></script>
  </body>
</html>
