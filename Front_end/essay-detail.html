<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>笔落客 - 随笔详情</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./article-detail.css" />
    <link rel="stylesheet" href="./site-session.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="笔落客首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M8.5 8 5 12l3.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <path d="m15.5 8 3.5 4-3.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <path d="m13.5 6-3 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </span>
          <span class="brand-text">笔落客</span>
        </a>

        <nav class="site-nav" aria-label="主导航">
          <svg class="nav-road-svg" viewBox="0 0 600 50" preserveAspectRatio="none">
            <defs>
              <linearGradient id="navRoadGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#e8edf5"/>
                <stop offset="50%" stop-color="#dde4ee"/>
                <stop offset="100%" stop-color="#e8edf5"/>
              </linearGradient>
            </defs>
            <path class="nav-road-path" d="M0 35 Q 60 15, 120 35 Q 180 55, 240 35 Q 300 15, 360 35 Q 420 55, 480 35 Q 540 15, 600 35" fill="none" stroke="url(#navRoadGradient)" stroke-width="16" stroke-linecap="round"/>
            <path class="nav-road-line" d="M0 35 Q 60 15, 120 35 Q 180 55, 240 35 Q 300 15, 360 35 Q 420 55, 480 35 Q 540 15, 600 35" fill="none" stroke="#b8c5d6" stroke-width="2" stroke-dasharray="6 6" stroke-linecap="round"/>
          </svg>
          
          <a class="nav-item" href="./index.html" data-nav="0">首页</a>
          <a class="nav-item" href="./category.html" data-nav="1">分类</a>
          <a class="nav-item" href="./about-author.html" data-nav="2">关于作者</a>
          <a class="nav-item nav-admin-link" href="./my-articles.html" data-nav="3" hidden>我的文章</a>
          <a class="nav-item nav-admin-essay-link" href="./my-essays.html" data-nav="4" hidden>我的随笔</a>
          
          <div class="nav-road-car" id="navRoadCar">
            <img src="https://cdn-icons-png.flaticon.com/512/3774/3774278.png" alt="小汽车" />
          </div>
        </nav>

        <div class="auth-actions" data-enable-admin-publish="true">
          <a class="link-login" href="./auth.html?tab=login">登录</a>
          <a class="btn-register" href="./auth.html?tab=register">注册</a>
        </div>
      </div>
    </header>

    <main class="article-page">
      <div class="container">
        <div class="page-top-bar">
          <button type="button" class="back-btn" id="back-btn" aria-label="返回上一页">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>返回</span>
          </button>
          <nav class="breadcrumb" aria-label="面包屑">
            <a href="./index.html">首页</a>
            <span>/</span>
            <a href="./index.html#latest-essays">随笔</a>
            <span>/</span>
            <span id="breadcrumb-title" aria-current="page">随笔详情</span>
          </nav>
        </div>

        <div class="article-layout">
          <article class="panel article-main">
            <header class="article-header">
              <h1 id="essay-title"></h1>
              <div class="meta-line">
                <span class="meta-item meta-author">
                  <img
                    id="essay-author-avatar"
                    src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e5e7eb' width='100' height='100'/%3E%3C/svg%3E"
                    alt="作者头像"
                  />
                  <span id="essay-author-name"></span>
                </span>
                <span class="meta-item" id="essay-date"></span>
                <span class="meta-item">随笔</span>
              </div>
            </header>

            <section id="essay-content" class="article-content" aria-label="随笔正文"></section>
          </article>

          <aside class="article-sidebar">
            <div class="sticky-stack">
              <section class="panel related-panel" aria-label="更多随笔">
                <h2>更多随笔</h2>
                <div id="more-essays-container"></div>
              </section>

              <section class="panel sidebar-author" aria-label="作者卡片">
                <img id="sidebar-author-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e5e7eb' width='100' height='100'/%3E%3C/svg%3E" alt="作者头像" />
                <h3 id="sidebar-author-name"></h3>
                <p id="sidebar-author-bio"></p>
                <div class="author-stats">
                  <div>
                    <strong id="sidebar-article-count">--</strong>
                    <span>文章</span>
                  </div>
                  <div>
                    <strong>--</strong>
                    <span>关注</span>
                  </div>
                  <div>
                    <strong id="sidebar-total-views">--</strong>
                    <span>阅读</span>
                  </div>
                </div>
                <button type="button" id="sidebar-author-btn">关于作者</button>
              </section>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© 2026 笔落客 | 保留所有权利</p>
      </div>
    </footer>

    <script src="./aliyun-storage.js"></script>
    <script src="./site-api.js"></script>
    <script src="./site-session.js"></script>
    <script src="./nav-road-car.js"></script>
    <script type="module" src="./essay-detail.js"></script>
  </body>
</html>
